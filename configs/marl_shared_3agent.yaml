# MARL Shared 3 Agents - Moving Obstacles
num_rays: 120
goal_threshold: 0.02
num_agents_per_group: 1
terminal_strategy: all_good

boundary:
  type: polygon
  vertices:
    - { x: 0.1, y: 0.1 }
    - { x: 0.9, y: 0.1 }
    - { x: 0.9, y: 0.9 }
    - { x: 0.1, y: 0.9 }

agents:
  - start_pos: { center: { x: 0.2, y: 0.2 }, width: 0.15, height: 0.15 }
    goal_pos: { center: { x: 0.8, y: 0.8 }, width: 0.05, height: 0.05 }
    radius: 0.015
    max_speed: 0.2
    fov_degrees: 360
    max_range: 0.3
    agent_col: red

  - start_pos: { center: { x: 0.2, y: 0.2 }, width: 0.15, height: 0.15 }
    goal_pos: { center: { x: 0.8, y: 0.8 }, width: 0.05, height: 0.05 }
    radius: 0.015
    max_speed: 0.2
    fov_degrees: 360
    max_range: 0.3
    agent_col: blue

  - start_pos: { center: { x: 0.2, y: 0.2 }, width: 0.15, height: 0.15 }
    goal_pos: { center: { x: 0.8, y: 0.8 }, width: 0.05, height: 0.05 }
    radius: 0.015
    max_speed: 0.2
    fov_degrees: 360
    max_range: 0.3
    agent_col: green

obstacles:
  - shape:
      type: rectangle
      center: { x: 0.65, y: 0.5 }
      width: 0.15
      height: 0.06
    schedule:
      speed: 0.08
      direction: { x: -1, y: 0 }
      angular_speed: 15
      boundary_x_min: 0.2
      boundary_x_max: 0.8

  - shape:
      type: rectangle
      center: { x: 0.35, y: 0.65 }
      width: 0.1
      height: 0.06
    schedule:
      speed: 0.1
      direction: { x: 1, y: 0 }
      angular_speed: 20
      boundary_x_min: 0.2
      boundary_x_max: 0.8

  - shape:
      type: rectangle
      center: { x: 0.5, y: 0.4 }
      width: 0.02
      height: 0.15
    schedule:
      angular_speed: 25

max_time: 500
