# MARL Shared Goal - Agents spawn in same area and go to same goal
num_rays: 120
goal_threshold: 0.05
num_agents_per_group: 1
terminal_strategy: all_good

boundary:
  type: polygon
  vertices:
    - { x: 0.1, y: 0.1 }
    - { x: 0.9, y: 0.1 }
    - { x: 0.9, y: 0.9 }
    - { x: 0.1, y: 0.9 }

agents:
  - start_pos: { center: { x: 0.2, y: 0.2 }, width: 0.15, height: 0.15 }
    goal_pos: { center: { x: 0.8, y: 0.8 }, width: 0.05, height: 0.05 }
    radius: 0.015
    max_speed: 0.2
    fov_degrees: 360
    max_range: 0.3
    agent_col: red

  - start_pos: { center: { x: 0.2, y: 0.2 }, width: 0.15, height: 0.15 }
    goal_pos: { center: { x: 0.8, y: 0.8 }, width: 0.05, height: 0.05 }
    radius: 0.015
    max_speed: 0.2
    fov_degrees: 360
    max_range: 0.3
    agent_col: blue

  - start_pos: { center: { x: 0.2, y: 0.2 }, width: 0.15, height: 0.15 }
    goal_pos: { center: { x: 0.8, y: 0.8 }, width: 0.05, height: 0.05 }
    radius: 0.015
    max_speed: 0.2
    fov_degrees: 360
    max_range: 0.3
    agent_col: green

  - start_pos: { center: { x: 0.2, y: 0.2 }, width: 0.15, height: 0.15 }
    goal_pos: { center: { x: 0.8, y: 0.8 }, width: 0.05, height: 0.05 }
    radius: 0.015
    max_speed: 0.2
    fov_degrees: 360
    max_range: 0.3
    agent_col: yellow


obstacles:
   # 1. Large Orange Square (Top Left)
  - shape:
      type: rectangle
      center: { x: 0.25, y: 0.75 }
      width: 0.12
      height: 0.12
      rotation: 0

  # 3. Horizontal Bar (Below Small Square)
  - shape:
      type: rectangle
      center: { x: 0.48, y: 0.62 }
      width: 0.15
      height: 0.04
      rotation: 0
  - shape:
      type: rectangle
      center: { x: 0.525, y: 0.475 }
      width: 0.1
      height: 0.6
  - shape:
      type: circle
      center: { x: 0.525, y: 0.5 }
      radius: 0.1

max_time: 500
