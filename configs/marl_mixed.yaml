# MARL Mixed - Hard: 8 agents, static + moving obstacles, same fixed boundary
num_rays: 120
goal_threshold: 0.02
num_agents_per_group: 1
terminal_strategy: individual

boundary:
  type: polygon
  vertices:
    - { x: 0.1, y: 0.1 }
    - { x: 0.9, y: 0.1 }
    - { x: 0.9, y: 0.9 }
    - { x: 0.1, y: 0.9 }

agents:
  - start_pos: { center: { x: 0.2, y: 0.2 }, width: 0.15, height: 0.15 }
    goal_pos: { center: { x: 0.8, y: 0.8 }, width: 0.05, height: 0.05 }
    radius: 0.015
    max_speed: 0.2
    fov_degrees: 360
    max_range: 0.3
    agent_col: red

  - start_pos: { center: { x: 0.2, y: 0.2 }, width: 0.15, height: 0.15 }
    goal_pos: { center: { x: 0.8, y: 0.8 }, width: 0.05, height: 0.05 }
    radius: 0.015
    max_speed: 0.2
    fov_degrees: 360
    max_range: 0.3
    agent_col: blue

  - start_pos: { center: { x: 0.2, y: 0.2 }, width: 0.15, height: 0.15 }
    goal_pos: { center: { x: 0.8, y: 0.8 }, width: 0.05, height: 0.05 }
    radius: 0.015
    max_speed: 0.2
    fov_degrees: 360
    max_range: 0.3
    agent_col: green

  - start_pos: { center: { x: 0.2, y: 0.2 }, width: 0.15, height: 0.15 }
    goal_pos: { center: { x: 0.8, y: 0.8 }, width: 0.05, height: 0.05 }
    radius: 0.015
    max_speed: 0.2
    fov_degrees: 360
    max_range: 0.3
    agent_col: yellow

obstacles:
  # Static obstacles
  - shape:
      type: circle
      center: { x: 0.5, y: 0.5 }
      radius: 0.07
  - shape:
      type: rectangle
      center: { x: 0.3, y: 0.3 }
      width: 0.08
      height: 0.04
  - shape:
      type: rectangle
      center: { x: 0.2, y: 0.6 }
      width: 0.08
      height: 0.04
  # Moving obstacles
  - shape:
      type: rectangle
      center: { x: 0.7, y: 0.5 }
      width: 0.12
      height: 0.1
    schedule:
      speed: 0.08
      direction: { x: -1, y: 0 }
      angular_speed: 12
      boundary_x_min: 0.2
      boundary_x_max: 0.8
  - shape:
      type: rectangle
      center: { x: 0.4, y: 0.7 }
      width: 0.2
      height: 0.12
    schedule:
      angular_speed: 30

max_time: 500
