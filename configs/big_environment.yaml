num_rays: 60
repeat_steps: 2
goal_threshold: 0.015
num_agents_per_group: 2          # 2 agents per group entry = 4 total agents
terminal_strategy: any           # Episode ends when ANY ONE agent reaches its goal
simultaneous_arrival_bonus: 0.0
formation_reward_weight: 0.6     
potential_shaping_scale: 25.0     # EASY MODE: Maximum pull to ensure movement
stuck_zone_penalty: 10.0         # EASY MODE: Minimal penalty for revisiting spots
goal_reach_bonus: 100.0           
winner_team_bonus: 70.0           
loser_team_penalty: 20.0          # EASY MODE: Low competitive pressure
not_reached_goal_penalty: 20.0    # EASY MODE: Low timeout pressure
collision_penalty: 5.0            # EASY MODE: Very low fear of walls
agent_collision_penalty: 2.0      # EASY MODE: Very low fear of teammates

boundary:
  type: polygon
  vertices:
    - { x: 0.05, y: 0.05 }
    - { x: 0.95, y: 0.05 }
    - { x: 0.95, y: 0.95 }
    - { x: 0.05, y: 0.95 }

agents:
  # === GROUP 1 (Red + Blue) ===
  - start_pos: { center: { x: 0.12, y: 0.12 }, width: 0.08, height: 0.01 }
    goal_pos: { center: { x: 0.79, y: 0.88 }, width: 0.08, height: 0.01 }
    radius: 0.0085
    max_speed: 0.12
    fov_degrees: 360
    max_range: 0.20
    agent_col: red

  # === GROUP 2 (Green + Yellow) ===
  - start_pos: { center: { x: 0.16, y: 0.12 }, width: 0.08, height: 0.01 }
    goal_pos: { center: { x: 0.79, y: 0.88 }, width: 0.08, height: 0.01 }
    radius: 0.0085
    max_speed: 0.12
    fov_degrees: 360
    max_range: 0.20
    agent_col: green

obstacles:
  # Central vertical walls
  - shape:
      type: rectangle
      center: { x: 0.5, y: 0.2 }
      width: 0.02
      height: 0.3
  - shape:
      type: rectangle
      center: { x: 0.5, y: 0.8 }
      width: 0.02
      height: 0.3

  # Horizontal short wall
  - shape:
      type: rectangle
      center: { x: 0.7, y: 0.8 }
      width: 0.02
      height: 0.02

  # Moving platform
  - shape:
      type: rectangle
      center: { x: 0.5, y: 0.5 }
      width: 0.05
      height: 0.15
    schedule:
      speed: 0.12
      direction: { x: 1, y: 0 }
      angular_speed: 0
      boundary_x_min: 0.25
      boundary_x_max: 0.75

  # Left-side spinning block (Adjusted y from 0.5 to 0.3)
  - shape:
      type: rectangle
      center: { x: 0.3, y: 0.3 }
      width: 0.08
      height: 0.08
    schedule:
      angular_speed: 60

  # Right-side static circles
  - shape:
      type: circle
      center: { x: 0.7, y: 0.35 }
      radius: 0.05
  - shape:
      type: circle
      center: { x: 0.7, y: 0.65 }
      radius: 0.05

  # Left-side circle
  - shape:
      type: circle
      center: { x: 0.2, y: 0.65 }
      radius: 0.05

max_time: 600
