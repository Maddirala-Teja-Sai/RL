num_rays: 32
repeat_steps: 2
goal_threshold: 0.015
num_agents_per_group: 5          # All 5 in one group for formation tracking
terminal_strategy: any           # Episode ends when ANY ONE agent reaches its goal
simultaneous_arrival_bonus: 40.0 # Bonus if 2+ agents arrive in same window
simultaneous_arrival_window: 60  # Within 60 steps = "arrived together"
formation_reward_weight: 0.5     # Core cooperation: stay close while moving
potential_shaping_scale: 6.0     # Dense navigation signal toward goal
stuck_zone_penalty: 80.0         # Penalty for revisiting stuck positions

boundary:
  type: polygon
  vertices:
    - { x: 0.05, y: 0.05 }
    - { x: 0.95, y: 0.05 }
    - { x: 0.95, y: 0.95 }
    - { x: 0.05, y: 0.95 }

agents:
  # 5 agents start at the bottom, goals clustered at the top-right.
  # They MUST stay in formation to get the formation reward.
  # The episode ends as soon as any ONE reaches its goal.
  - start_pos: { center: { x: 0.10, y: 0.15 }, width: 0.01, height: 0.01 }
    goal_pos: { center: { x: 0.76, y: 0.88 }, width: 0.01, height: 0.01 }
    radius: 0.0075
    max_speed: 0.12
    fov_degrees: 360
    max_range: 0.18
    agent_col: red

  - start_pos: { center: { x: 0.12, y: 0.15 }, width: 0.01, height: 0.01 }
    goal_pos: { center: { x: 0.78, y: 0.88 }, width: 0.01, height: 0.01 }
    radius: 0.0075
    max_speed: 0.12
    fov_degrees: 360
    max_range: 0.18
    agent_col: blue

  - start_pos: { center: { x: 0.14, y: 0.15 }, width: 0.01, height: 0.01 }
    goal_pos: { center: { x: 0.80, y: 0.88 }, width: 0.01, height: 0.01 }
    radius: 0.0075
    max_speed: 0.12
    fov_degrees: 360
    max_range: 0.18
    agent_col: green

  - start_pos: { center: { x: 0.16, y: 0.15 }, width: 0.01, height: 0.01 }
    goal_pos: { center: { x: 0.82, y: 0.88 }, width: 0.01, height: 0.01 }
    radius: 0.0075
    max_speed: 0.12
    fov_degrees: 360
    max_range: 0.18
    agent_col: yellow

  - start_pos: { center: { x: 0.18, y: 0.15 }, width: 0.01, height: 0.01 }
    goal_pos: { center: { x: 0.84, y: 0.88 }, width: 0.01, height: 0.01 }
    radius: 0.0075
    max_speed: 0.12
    fov_degrees: 360
    max_range: 0.18
    agent_col: cyan

obstacles:
  # Central vertical walls (narrowed by user for wider corridor)
  - shape:
      type: rectangle
      center: { x: 0.5, y: 0.2 }
      width: 0.02
      height: 0.3
  - shape:
      type: rectangle
      center: { x: 0.5, y: 0.8 }
      width: 0.02
      height: 0.3

  # Horizontal wall at top-right (user-added)
  - shape:
      type: rectangle
      center: { x: 0.7, y: 0.8 }
      width: 0.3
      height: 0.02

  # Moving platform sliding horizontally (creates timing challenge)
  - shape:
      type: rectangle
      center: { x: 0.5, y: 0.5 }
      width: 0.05
      height: 0.15
    schedule:
      speed: 0.12
      direction: { x: 1, y: 0 }
      angular_speed: 0
      boundary_x_min: 0.25
      boundary_x_max: 0.75

  # Left-side spinning block
  - shape:
      type: rectangle
      center: { x: 0.3, y: 0.5 }
      width: 0.08
      height: 0.08
    schedule:
      angular_speed: 60

  # Right-side static circles
  - shape:
      type: circle
      center: { x: 0.7, y: 0.35 }
      radius: 0.05
  - shape:
      type: circle
      center: { x: 0.7, y: 0.65 }
      radius: 0.05

  # Left-side circle (user-added)
  - shape:
      type: circle
      center: { x: 0.2, y: 0.65 }
      radius: 0.05

max_time: 600
