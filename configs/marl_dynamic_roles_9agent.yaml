# 9-agent Dynamic Role environment.
# Agents must coordinate on 9 distinct goals. Any agent can take any goal.
num_rays: 60
goal_threshold: 0.02
repeat_steps: 2
num_agents_per_group: 9
max_time: 1500
formation_reward_weight: 0.0
use_shared_goals: true

boundary:
  type: polygon
  vertices:
    - { x: 0.0, y: 0.0 }
    - { x: 1.0, y: 0.0 }
    - { x: 1.0, y: 1.0 }
    - { x: 0.0, y: 1.0 }

agents:
  - start_pos: { center: { x: 0.1, y: 0.5 }, width: 0.1, height: 0.8 }
    goal_pos: { center: { x: 0.9, y: 0.1 }, width: 0.1, height: 0.1 } # Goal Pool 1
    radius: 0.015
    max_speed: 0.2
  - start_pos: { center: { x: 0.1, y: 0.5 }, width: 0.1, height: 0.8 }
    goal_pos: { center: { x: 0.9, y: 0.2 }, width: 0.1, height: 0.1 } # Goal Pool 2
  - start_pos: { center: { x: 0.1, y: 0.5 }, width: 0.1, height: 0.8 }
    goal_pos: { center: { x: 0.9, y: 0.3 }, width: 0.1, height: 0.1 } # Goal Pool 3
  - start_pos: { center: { x: 0.1, y: 0.5 }, width: 0.1, height: 0.8 }
    goal_pos: { center: { x: 0.9, y: 0.4 }, width: 0.1, height: 0.1 } # Goal Pool 4
  - start_pos: { center: { x: 0.1, y: 0.5 }, width: 0.1, height: 0.8 }
    goal_pos: { center: { x: 0.9, y: 0.5 }, width: 0.1, height: 0.1 } # Goal Pool 5
  - start_pos: { center: { x: 0.1, y: 0.5 }, width: 0.1, height: 0.8 }
    goal_pos: { center: { x: 0.9, y: 0.6 }, width: 0.1, height: 0.1 } # Goal Pool 6
  - start_pos: { center: { x: 0.1, y: 0.5 }, width: 0.1, height: 0.8 }
    goal_pos: { center: { x: 0.9, y: 0.7 }, width: 0.1, height: 0.1 } # Goal Pool 7
  - start_pos: { center: { x: 0.1, y: 0.5 }, width: 0.1, height: 0.8 }
    goal_pos: { center: { x: 0.9, y: 0.8 }, width: 0.1, height: 0.1 } # Goal Pool 8
  - start_pos: { center: { x: 0.1, y: 0.5 }, width: 0.1, height: 0.8 }
    goal_pos: { center: { x: 0.9, y: 0.9 }, width: 0.1, height: 0.1 } # Goal Pool 9

obstacles:
  - shape: { type: rectangle, center: { x: 0.5, y: 0.5 }, width: 0.4, height: 0.4 }
